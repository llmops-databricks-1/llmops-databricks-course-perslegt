resources:
  jobs:
    recipe_llm_experiments_job:
      name: recipe-llm-experiments
      tags:
        project_name: "llmops-databricks-course-perslegt"
        use_case: "recipe_generation"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: llm_recommendations
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/recipe_llm_experiments.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"