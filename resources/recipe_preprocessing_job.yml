resources:
  jobs:
    recipe_preprocessing_job:
      name: recipe-preprocessing
      tags:
        project_name: "llmops-databricks-course-perslegt"
        use_case: "recipe_generation"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"

      tasks:
        - task_key: preprocess_recipes
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/recipe_preprocessing.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"